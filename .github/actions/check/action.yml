name: Run checks
description: "Pre-flight checks: test, clippy, fmt, audit, deny, doc, examples"

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable

    - name: Build
      run: cargo build --features bladerf1
      shell: bash

    - name: Unit tests
      run: cargo test --lib
      shell: bash

    - name: Protocol tests
      run: cargo test --test unit
      shell: bash

    - name: Clippy
      run: cargo clippy --features bladerf1 --all-targets -- -D warnings
      shell: bash

    - name: Format check
      run: cargo fmt --all --check
      shell: bash

    - name: Security audit
      run: cargo install cargo-audit && cargo audit
      shell: bash

    - name: License deny
      run: cargo install cargo-deny && cargo deny check
      shell: bash

    - name: Documentation
      run: cargo doc --features bladerf1 --no-deps
      shell: bash

    - name: Build all examples
      run: |
        for manifest in examples/*/Cargo.toml; do
          pkg=$(grep '^name = ' "$manifest" | head -1 | sed 's/name = "\(.*\)"/\1/')
          cargo build -p "$pkg" 2>/dev/null || cargo build --manifest-path "$manifest"
        done
      shell: bash
