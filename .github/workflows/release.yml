name: Release

on:
  workflow_dispatch:
    inputs:
      level:
        description: Version bump level
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/check

  bump_and_tag:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - run: git config user.email "11601995+ratzrattillo@users.noreply.github.com"
      - run: git config user.name "ratzrattillo"
      - run: cargo release "${{ inputs.level }}" --execute --no-verify --no-publish

  github_release:
    needs: bump_and_tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - run: git fetch --tags origin
      - run: gh release create "$(git describe --tags --abbrev=0)" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: github_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - run: git fetch --tags origin
      - run: git checkout "$(git describe --tags --abbrev=0)"
      - run: cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
